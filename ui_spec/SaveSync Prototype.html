<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SaveSync</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { width: 100%; height: 100%; overflow: hidden; background: #07091a; }
    body { font-family: 'Inter', sans-serif; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #2a3560; border-radius: 99px; }
    ::-webkit-scrollbar-thumb:hover { background: #7c6fff; }

    /* Toast animations */
    @keyframes toastIn {
      from { opacity: 0; transform: translateX(20px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    @keyframes toastOut {
      from { opacity: 1; transform: translateX(0); }
      to   { opacity: 0; transform: translateX(20px); }
    }

    /* Keyframes */
    @keyframes pulsering {
      0%   { transform: scale(1);   opacity: 0.8; }
      100% { transform: scale(2.8); opacity: 0; }
    }
    @keyframes radar {
      0%   { transform: scale(0.6); opacity: 0.6; }
      100% { transform: scale(2.2); opacity: 0; }
    }

    /* Input focus ring */
    input:focus { outline: none; border-color: #7c6fff !important; box-shadow: 0 0 0 2px rgba(124,111,255,0.15); }
    input[type="range"] { cursor: pointer; }
    input[type="checkbox"] { cursor: pointer; accent-color: #7c6fff; width: 15px; height: 15px; }

    /* Prevent text selection on nav clicks */
    button { user-select: none; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- Data layer (plain JS) -->
  <script src="ss_data.js"></script>
  <script src="ss_thumbs.js"></script>

  <!-- React components -->
  <script type="text/babel" src="ss_toasts.jsx"></script>
  <script type="text/babel" src="ss_health.jsx"></script>
  <script type="text/babel" src="ss_sidebar.jsx"></script>
  <script type="text/babel" src="ss_games.jsx"></script>
  <script type="text/babel" src="ss_watcher.jsx"></script>
  <script type="text/babel" src="ss_settings.jsx"></script>
  <script type="text/babel" src="ss_app.jsx"></script>
</body>
</html>
